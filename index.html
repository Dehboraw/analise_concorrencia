<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico - Candidatos por Vaga</title> 
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body> <header class="px-3 py-2 text-bg-dark border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                <use xlink:href="#bootstrap"></use>
            </svg>
            <span class="fs-4" color="white">Análise concorrência UEPG</span>
        </a>
        <ul class="nav nav-pills">
            <li class="nav-item">
                <a href="#" class="nav-link active" aria-current="page">Gráficos</a>
            </li>
            <li class="nav-item"><a href="#" class="nav-link">Tabelas</a></li>
        </ul>
    </header>

    <section>
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <strong class="me-auto">Dica</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Para visualizar a concorrência de uma cota específica, clique naquelas que deseja ocultar.
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <div id="charts" class="row">
                </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <script type="module">
            // Importa o banco de dados unificado
            import { db } from './database.js'

            // --- NOVO: Inicialização do Toast para aparecer assim que a página carregar ---
            const toastEl = document.getElementById('liveToast');
            const toast = new bootstrap.Toast(toastEl);
            toast.show(); // Exibe o toast na tela
            // ----------------------------------------------------------------------------

            const charts = document.querySelector('#charts')

            // Mapeamento de cores estáticas para cada tipo de cota/vaga
            const coresCotas = {
                "Universal": "#36A2EB",
                "Negro": "#FF6384",
                "publica": "#FFCE56",
                "PCD": "#4BC0C0"
            };

            db.cursos.forEach(curso => {
                const canvasId = `chart-${curso.id}-${curso.nome.replace(/\s+/g, '')}`;

                const chartHTML = `
                    <section class="col-md-6 mb-4">
                        <div class="card h-100 p-3 shadow-sm">
                            <h3 class="h5 border-bottom pb-2">${curso.nome} (${curso.modalidade})</h3>
                            <canvas id="${canvasId}"></canvas>
                        </div>
                    </section>
                `;
                charts.insertAdjacentHTML('beforeend', chartHTML);
                    
                const ctx = document.getElementById(canvasId);

                const anosOrdenados = curso.cotas.map(c => c.ano).sort((a, b) => a - b);
                const tiposUnicos = [...new Set(curso.cotas.flatMap(c => c.tipoCota.map(t => t.tipo)))];

                const datasets = tiposUnicos.map(tipo => {
                    const dadosConcorrencia = anosOrdenados.map(ano => {
                        const dadosDoAno = curso.cotas.find(c => c.ano === ano);
                        const infoCota = dadosDoAno ? dadosDoAno.tipoCota.find(t => t.tipo === tipo) : null;
                        
                        if (infoCota && infoCota.vagas > 0) {
                            return parseFloat((infoCota.candidatos / infoCota.vagas).toFixed(2));
                        }
                        return 0;
                    });

                    return {
                        label: tipo === 'publica' ? 'Escola Pública' : tipo,
                        data: dadosConcorrencia,
                        borderColor: coresCotas[tipo] || '#9966FF',
                        backgroundColor: coresCotas[tipo] || '#9966FF',
                        borderWidth: 2,
                        tension: 0.1
                    };
                });

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: anosOrdenados,
                        datasets: datasets
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return `${context.dataset.label}: ${context.raw} cand/vaga`;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: { display: true, text: 'Candidatos por Vaga' }
                            },
                            x: {
                                title: { display: true, text: 'Ano' }
                            }
                        }
                    }
                });
            });
        </script>
    </section>
</body>
</html>
